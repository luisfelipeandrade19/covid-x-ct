services:
  classificador:
    build: .
    volumes:
      - D:\Dataset:/app/data        # Dataset local montado no contêiner
      - ./outputs:/app/outputs      # Outputs gerados (gráficos, métricas)

    environment:
      - DATASET_PATH=/app/data      # Caminho do dataset dentro do contêiner

    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]