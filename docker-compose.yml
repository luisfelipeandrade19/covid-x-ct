services:
  classificador:
    build: .
    volumes:
      - /media/riccelli/Datasets_LISA/datasets_covid/covidxct:/app/data  # Dataset do lab
      - ./outputs:/app/outputs      # Outputs gerados (gráficos, métricas)

    environment:
      - DATASET_PATH=/app/data      # Caminho do dataset dentro do contêiner

    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]